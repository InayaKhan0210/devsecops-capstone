<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Notes App</title>
</head>
<body>
    <h1>DevSecOps Notes App</h1>

    <form action="/add" method="POST">
        <input type="text" name="note" placeholder="Write a note" required>
        <button type="submit">Add Note</button>
    </form>

    <h2>Notes</h2>
    <ul>
        {% for note in notes %}
            <li>{{ note.note }}</li>
        {% endfor %}
    </ul>
</body>
</html>
