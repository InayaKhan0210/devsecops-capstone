<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Notes App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>DevSecOps Notes App</h1>
        <p class="subtitle">A simple Flask + MongoDB app for DevSecOps pipeline deployment</p>

        <form action="/add" method="POST" class="note-form">
            <input type="text" name="note" placeholder="Write a note..." required>
            <button type="submit">Add Note</button>
        </form>

        <div class="notes-card">
            <h2>Your Notes</h2>
            <ul>
                {% for note in notes %}
                    <li>{{ note.note }}</li>
                {% else %}
                    <p class="empty">No notes yet. Add your first note!</p>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
